# NGINX Configuration for e-library-portal.app
# This proxies /api requests to the backend, avoiding CORS issues

upstream backend_api {
    # Your backend server
    server elibrary.pncproject.site:443;
}

server {
    listen 443 ssl http2;
    server_name e-library-portal.app;

    # SSL certificates
    ssl_certificate /path/to/your/certificate.crt;
    ssl_certificate_key /path/to/your/private.key;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Frontend static files
    root /var/www/e-library-admin-author/dist;
    index index.html index.htm;

    # Serve static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # IMPORTANT: Proxy /api requests to backend
    # This avoids CORS issues by keeping same origin
    location /api/ {
        # Remove /api prefix when proxying to backend
        rewrite ^/api(/.*)$ $1 break;
        
        proxy_pass https://elibrary.pncproject.site;
        
        # Preserve original headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Timeouts
        proxy_connect_timeout 8s;
        proxy_send_timeout 8s;
        proxy_read_timeout 8s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # SPA: Route all unmatched paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Deny access to sensitive files
    location ~ /\.env {
        deny all;
    }
}

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name e-library-portal.app;
    return 301 https://$server_name$request_uri;
}
